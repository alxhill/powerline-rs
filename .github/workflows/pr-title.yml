name: PR Title

# release-plz derives version bumps and the changelog from conventional
# commits. PRs are squash-merged, so the PR title becomes the commit subject
# on main - this check keeps that subject in Conventional Commits format.

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
